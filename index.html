<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Viewer</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/elevatezoom/3.0.8/jquery.elevateZoom.min.js"></script>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

img{
  max-width:90%;
  border-radius:10px;
  cursor: zoom-in;
}
</style>
</head>

<body>

<img 
  id="zoom"
  src="https://res.cloudinary.com/dwzzrduao/image/upload/v1776566069/IMG_7320_iacceh.jpg"
  data-zoom-image="https://res.cloudinary.com/dwzzrduao/image/upload/v1776566069/IMG_7320_iacceh.jpg"
/>

<script>
$("#zoom").elevateZoom({
  zoomType: "lens",
  lensShape: "round",
  lensSize: 200
});
</script>

</body>
</html>
